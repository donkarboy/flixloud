<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌙 Lunar Anime Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d0d0d; color: #eee; padding: 24px; }
  h2 { margin-bottom: 16px; color: #7af; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
  label { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  input[type="number"] { padding: 7px 10px; background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 5px; width: 120px; }
  input[type="checkbox"] { accent-color: #7af; width: 15px; height: 15px; }
  button { padding: 8px 18px; background: #1e3a5f; color: #7af; border: 1px solid #7af; border-radius: 5px; cursor: pointer; font-size: 14px; }
  button:hover { background: #2a4f80; }
  #status { margin: 12px 0; font-size: 13px; color: #fa4; min-height: 20px; }
  .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; margin: 8px 0; transition: border-color 0.2s; }
  .card:hover { border-color: #555; }
  .card-row { display: flex; gap: 10px; margin: 4px 0; font-size: 13px; }
  .lbl { color: #666; min-width: 60px; }
  .val { color: #ccc; }
  a { color: #4af; word-break: break-all; }
  a:hover { color: #7cf; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-left: 6px; }
  .sub { background: #1a3a1a; color: #4f4; border: 1px solid #4f4; }
  .dub { background: #3a1a1a; color: #f44; border: 1px solid #f44; }
</style>
</head>
<body>

<h2>🌙 Lunar Anime Player API</h2>

<div class="row">
  <label>AniList ID <input type="number" id="anilist_id" value="1735"></label>
  <label>Episode <input type="number" id="episode" value="1"></label>
  <label><input type="checkbox" id="skip_intro"> Skip Intro</label>
  <label><input type="checkbox" id="skip_outro"> Skip Outro</label>
  <button onclick="fetchPlayer()">Fetch Servers</button>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
const PROXY = "https://odd-heart-2567.andruilsyestems.workers.dev";

function setStatus(msg, color = "#fa4") {
  const el = document.getElementById("status");
  el.style.color = color;
  el.textContent = msg;
}

async function fetchPlayer() {
  const params = new URLSearchParams({
    anilist: document.getElementById("anilist_id").value,
    episode: document.getElementById("episode").value,
    autoplay: "true",
    ...(document.getElementById("skip_intro").checked && { skip_intro: "true" }),
    ...(document.getElementById("skip_outro").checked && { skip_outro: "true" }),
  });

  document.getElementById("results").innerHTML = "";
  setStatus("Fetching...");

  try {
    const res = await fetch(`${PROXY}/?${params}`);
    const text = await res.text();

    if (!text.trim().startsWith("{")) throw new Error("Non-JSON response: " + text.slice(0, 80));

    const data = JSON.parse(text);
    if (!data.success) { setStatus("API error: " + JSON.stringify(data)); return; }

    // Expand flixcloud → sub + dub
    const expanded = [];
    for (const s of data.data || []) {
      const pu = s.player_url || "";
      if (pu.includes("flixcloud.cc")) {
        const sep = pu.includes("?") ? "&" : "?";
        expanded.push({ ...s, audio: "sub", player_url: `${pu}${sep}a=1` });
        expanded.push({ ...s, audio: "dub", player_url: `${pu}${sep}a=2` });
      } else {
        expanded.push(s);
      }
    }

    setStatus(`✅ Found ${expanded.length} server(s)`, "#4f4");

    document.getElementById("results").innerHTML = expanded.map(s => {
      const audio = s.audio || "";
      const badge = audio === "sub" ? `<span class="badge sub">SUB</span>`
                  : audio === "dub" ? `<span class="badge dub">DUB</span>` : "";
      return `
        <div class="card">
          <div class="card-row"><span class="lbl">Server</span><span class="val">${s.server || "—"}${badge}</span></div>
          <div class="card-row"><span class="lbl">Audio</span><span class="val">${audio || "—"}</span></div>
          <div class="card-row"><span class="lbl">URL</span><a href="${s.player_url}" target="_blank">${s.player_url}</a></div>
        </div>`;
    }).join("");

  } catch (e) {
    setStatus("❌ " + e.message, "#f44");
  }
}
</script>

</body>
</html>
