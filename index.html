<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const PROXY = "https://odd-heart-2567.andruilsyestems.workers.dev";

async function main() {
  // Parse URL: /flixloud/1735/1
  const parts = window.location.pathname.replace(/^\/[^/]+\//, "").split("/").filter(Boolean);
  const anilist_id = parts[0];
  const episode    = parts[1];

  // If no ID/episode in URL, show usage
  if (!anilist_id || !episode) {
    return json({ error: "Usage: /flixloud/{anilist_id}/{episode}" });
  }

  try {
    const params = new URLSearchParams({ anilist: anilist_id, episode, autoplay: "true" });
    const res  = await fetch(`${PROXY}/?${params}`);
    const text = await res.text();

    if (!text.trim().startsWith("{")) throw new Error("Non-JSON from proxy");

    const data = JSON.parse(text);
    if (!data.success) return json(data);

    // Expand flixcloud → sub + dub
    const expanded = [];
    for (const s of data.data || []) {
      const pu = s.player_url || "";
      if (pu.includes("flixcloud.cc")) {
        const sep = pu.includes("?") ? "&" : "?";
        expanded.push({ ...s, audio: "sub", player_url: `${pu}${sep}a=1` });
        expanded.push({ ...s, audio: "dub", player_url: `${pu}${sep}a=2` });
      } else {
        expanded.push(s);
      }
    }

    json({ success: true, anilist_id, episode, total: expanded.length, data: expanded });

  } catch (e) {
    json({ success: false, error: e.message });
  }
}

function json(data) {
  // Render clean JSON in browser
  document.open();
  document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Lunar API</title>
    <style>
      body { background: #0d0d0d; color: #c9d1d9; font-family: monospace; font-size: 13px; padding: 20px; }
      pre { white-space: pre-wrap; word-break: break-all; }
      .key { color: #79c0ff; }
      .str { color: #a5d6ff; }
      .num { color: #f0883e; }
      .bool { color: #ff7b72; }
      .null { color: #8b949e; }
    </style>
  </head><body><pre>${syntaxHighlight(data)}</pre></body></html>`);
  document.close();
}

function syntaxHighlight(obj) {
  return JSON.stringify(obj, null, 2)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      if (/^"/.test(match)) return match.endsWith(":") ? `<span class="key">${match}</span>` : `<span class="str">${match}</span>`;
      if (/true|false/.test(match)) return `<span class="bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="null">${match}</span>`;
      return `<span class="num">${match}</span>`;
    });
}

main();
</script>
</body>
</html>
